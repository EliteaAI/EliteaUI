name: Cherry-pick hotfix to main

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cherry_pick:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'hotfix/')
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Parse branch name
        id: parse
        run: |
          HOTFIX_BRANCH="${{ github.head_ref }}"
          # hotfix/MEN-123/some-description → pick/MEN-123/some-description
          PICK_BRANCH="pick/${HOTFIX_BRANCH#hotfix/}"
          echo "hotfix_branch=$HOTFIX_BRANCH" >> "$GITHUB_OUTPUT"
          echo "pick_branch=$PICK_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create pick branch and cherry-pick
        id: cherry_pick
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PICK_BRANCH="${{ steps.parse.outputs.pick_branch }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          git checkout main
          git checkout -b "$PICK_BRANCH"

          # Get the merge commit SHA from the merged PR
          MERGE_COMMIT=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid')

          if [ -z "$MERGE_COMMIT" ]; then
            echo "No merge commit found"
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Cherry-picking merge commit: $MERGE_COMMIT"

          # Determine merge method: if it's a squash/rebase merge, cherry-pick directly;
          # if it's a true merge commit (2 parents), use -m 1 to pick the first-parent diff.
          PARENT_COUNT=$(git cat-file -p "$MERGE_COMMIT" | grep -c '^parent ')

          CONFLICT=false
          if [ "$PARENT_COUNT" -gt 1 ]; then
            if ! git cherry-pick -m 1 "$MERGE_COMMIT"; then
              CONFLICT=true
              git cherry-pick --abort
            fi
          else
            if ! git cherry-pick "$MERGE_COMMIT"; then
              CONFLICT=true
              git cherry-pick --abort
            fi
          fi

          if [ "$CONFLICT" = true ]; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            # Reset and create an empty branch so we can still open a PR for visibility
            git checkout main
            git branch -D "$PICK_BRANCH"
            git checkout -b "$PICK_BRANCH"
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push pick branch
        if: steps.cherry_pick.outputs.has_commits == 'true'
        run: |
          git push -u origin "${{ steps.parse.outputs.pick_branch }}"

      - name: Create pull request
        if: steps.cherry_pick.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOTFIX_BRANCH="${{ steps.parse.outputs.hotfix_branch }}"
          PICK_BRANCH="${{ steps.parse.outputs.pick_branch }}"
          HOTFIX_PR="${{ github.event.pull_request.number }}"
          HAS_CONFLICTS="${{ steps.cherry_pick.outputs.has_conflicts }}"

          if [ "$HAS_CONFLICTS" = "true" ]; then
            BODY="$(cat <<EOF
          ## Cherry-pick from hotfix

          ⚠️ **Cherry-pick had merge conflicts and needs manual resolution.**

          - Source hotfix PR: #${HOTFIX_PR}
          - Hotfix branch: \`${HOTFIX_BRANCH}\`

          ### Steps to resolve
          \`\`\`bash
          git fetch origin
          git checkout ${PICK_BRANCH}
          # Cherry-pick the commits from the hotfix PR:
          gh pr view ${HOTFIX_PR} --json commits --jq '.commits[].oid' | xargs -n1 git cherry-pick
          # Resolve any conflicts, then:
          git cherry-pick --continue
          git push
          \`\`\`

          > **do not merge** until the fix is confirmed on the release branch.
          EOF
          )"
          else
            BODY="$(cat <<EOF
          ## Cherry-pick from hotfix

          Automatically cherry-picked from hotfix PR #${HOTFIX_PR}.

          - Hotfix branch: \`${HOTFIX_BRANCH}\`
          - Target: \`main\`

          > **do not merge** until the fix is confirmed on the release branch.
          EOF
          )"
          fi

          gh pr create \
            --base main \
            --head "$PICK_BRANCH" \
            --title "pick: cherry-pick ${HOTFIX_BRANCH#hotfix/} to main" \
            --body "$BODY" \
            --label "do not merge till confirmation"

      - name: Comment on hotfix PR
        if: steps.cherry_pick.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PICK_BRANCH="${{ steps.parse.outputs.pick_branch }}"
          HAS_CONFLICTS="${{ steps.cherry_pick.outputs.has_conflicts }}"

          # Find the pick PR number we just created
          PICK_PR=$(gh pr list --head "$PICK_BRANCH" --json number --jq '.[0].number')

          if [ "$HAS_CONFLICTS" = "true" ]; then
            COMMENT="🍒 Cherry-pick PR #${PICK_PR} was created to main, but **has merge conflicts** that need manual resolution."
          else
            COMMENT="🍒 Cherry-pick PR #${PICK_PR} was automatically created to main. It is labeled *do not merge till confirmation*."
          fi

          gh pr comment "${{ github.event.pull_request.number }}" --body "$COMMENT"
